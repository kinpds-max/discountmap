<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전국허브 | National Discount Map</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet Map (No API Key Required for Basic Use) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

    <div class="app-container">
        <!-- Jobs-style Header -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-bolt-lightning" style="color: #ff9f0a;"></i>
                전국<span>허브</span>
            </div>
            <div class="nav-right" style="display: flex; align-items: center; gap: 15px;">
                <div id="user-wisdom-level" title="나의 지혜 등급: 할인 명장">
                    <i class="fa-solid fa-medal" style="color: #ffd700;"></i>
                    <span style="font-size: 0.7rem; font-weight: 700;">Lv.7</span>
                </div>
                <a href="#" id="btn-share"><i class="fa-solid fa-arrow-up-from-bracket"></i></a>
                <a href="#" id="btn-notif"><i class="fa-regular fa-bell"></i></a>
                <button id="btn-login" class="apple-btn-outline">Login</button>
            </div>
        </header>

        <!-- Real-time Ticker -->
        <div id="real-time-ticker">
            <span class="pulse-dot"></span> <b>실시간 현황:</b> "방금 성수동 반찬가게 지혜로운 나눔이 등록되었습니다."
        </div>

        <!-- Main Map Area -->
        <div id="map-container">
            <div id="map"></div>
            
            <!-- Navigation Controls -->
            <button id="btn-locate" title="내 위치 찾기">
                <i class="fa-solid fa-location-crosshairs"></i>
            </button>
            
            <!-- Wisdom Share Button (Crowdsource) -->
            <button id="btn-wisdom" title="지혜 나누기">
                <i class="fa-solid fa-plus"></i>&nbsp; 지혜 나누기
            </button>

            <!-- Search & Filter Controls -->
            <div class="floating-overlay">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="main-search" placeholder="브랜드, 품목, 지역 검색...">
                </div>
                <!-- Mini Category Pills -->
                <div class="category-pills">
                    <span class="pill active" data-cat="all">전체</span>
                    <span class="pill" data-cat="Grocery">마트/식품</span>
                    <span class="pill" data-cat="Tech">전자기기</span>
                    <span class="pill" data-cat="Life">생활용품</span>
                </div>
            </div>

            <!-- Online/Offline Switcher (Hidden in new tab UI?) -->
            <div class="toggle-control" style="display: none;">
                <div class="toggle-item active" id="btn-offline">
                    <i class="fa-solid fa-location-dot"></i>&nbsp; Offline
                </div>
                <div class="toggle-item" id="btn-online">
                    <i class="fa-solid fa-globe"></i>&nbsp; Online
                </div>
            </div>
        </div>

        <!-- Detail Sheet (Sliding Panel) -->
        <div class="detail-sheet" id="detail-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-content">
                <!-- Tab Menu -->
                <div class="sheet-tabs">
                    <div class="sheet-tab active" data-tab="Wisdom">민간지혜</div>
                    <div class="sheet-tab" data-tab="Official">공식매장</div>
                    <div class="sheet-tab" data-tab="Online">온라인공구</div>
                </div>

                <p style="font-size: 0.85rem; color: var(--apple-gray); margin-bottom: 20px; text-align: center;">
                    <b id="status-date">2026. 04. 02.</b> 기준 파격 정보입니다.
                </p>
                
                <div id="item-list">
                    <!-- Cards will be injected by app.js -->
                    <div class="loading-state" style="text-align: center; padding: 50px;">
                        <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: var(--apple-gray)"></i>
                    </div>
                </div>
            </div>
        </div>

        <!-- One More Thing: Immersive Detail Modal -->
        <div id="immersive-modal" class="hidden">
            <div class="modal-close"><i class="fa-solid fa-xmark"></i></div>
            <div class="modal-content">
                <img id="modal-img" src="" alt="">
                <h1 id="modal-title">One More Thing...</h1>
                <div class="savings-visual">
                    <div class="bar-container">
                        <div class="bar market" id="market-bar" style="height: 100%;"></div>
                        <span>시중가</span>
                    </div>
                    <div class="bar-container">
                        <div class="bar discounted" id="discounted-bar" style="height: 30%;"></div>
                        <span>허브 할인가</span>
                    </div>
                    <div class="savings-percent" id="modal-save-percent">- 70%</div>
                </div>
                <div class="modal-description" id="modal-desc">
                    이 할인은 잡스가 설계한 듯 정교한 가격 가치를 제공합니다...
                </div>
                <button id="modal-link-btn" class="apple-btn" style="width: 100%; height: 52px; font-size: 1.1rem; margin-top: 30px;">
                    지금 바로 혜택 받기
                </button>
            </div>
        </div>
    </div>

    <!-- Modals & High-end UI Overlays -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
