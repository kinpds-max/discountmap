<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>전국허브 | National Discount Map</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Leaflet Map (No API Key Required for Basic Use) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
</head>
<body>

    <div class="app-container">
        <!-- Jobs-style Header -->
        <header>
            <div class="logo">
                <i class="fa-solid fa-bolt-lightning" style="color: #ff9f0a;"></i>
                전국<span>허브</span>
            </div>
            <nav class="nav-links">
                <a href="#" id="btn-share"><i class="fa-solid fa-arrow-up-from-bracket"></i></a>
                <a href="#" id="btn-notif"><i class="fa-regular fa-bell"></i></a>
            </div>
        </header>

        <!-- Main Map Area -->
        <div id="map-container">
            <div id="map"></div>
            
            <!-- Wisdom Share Button (Crowdsource) -->
            <button id="btn-wisdom" title="지혜 나누기">
                <i class="fa-solid fa-plus"></i>&nbsp; 지혜 나누기
            </button>

            <!-- Search & Filter Controls -->
            <div class="floating-overlay">
                <div class="search-bar">
                    <i class="fa-solid fa-magnifying-glass"></i>
                    <input type="text" id="main-search" placeholder="브랜드, 품목, 지역 검색...">
                </div>
                <!-- Mini Category Pills -->
                <div class="category-pills">
                    <span class="pill active" data-cat="all">전체</span>
                    <span class="pill" data-cat="Grocery">마트/식품</span>
                    <span class="pill" data-cat="Tech">전자기기</span>
                    <span class="pill" data-cat="Life">생활용품</span>
                </div>
            </div>

            <!-- Online/Offline Switcher -->
            <div class="toggle-control">
                <div class="toggle-item active" id="btn-offline">
                    <i class="fa-solid fa-location-dot"></i>&nbsp; Offline
                </div>
                <div class="toggle-item" id="btn-online">
                    <i class="fa-solid fa-globe"></i>&nbsp; Online
                </div>
            </div>
        </div>

        <!-- Detail Sheet (Sliding Panel) -->
        <div class="detail-sheet" id="detail-sheet">
            <div class="sheet-handle"></div>
            <div class="sheet-content">
                <h2 id="sheet-title">실시간 전국 할인 리스트</h2>
                <p style="font-size: 0.85rem; color: var(--apple-gray); margin-bottom: 20px;">
                    <b>2026. 04. 02.</b> 기준 시중가 대비 30% 이상 할인된 '역대급' 정보만 전시 중입니다.
                </p>
                
                <div id="item-list">
                    <!-- Cards will be injected by app.js -->
                    <div class="loading-state" style="text-align: center; padding: 50px;">
                        <i class="fa-solid fa-spinner fa-spin fa-2x" style="color: var(--apple-gray)"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Modals & High-end UI Overlays -->
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
